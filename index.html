<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZ! - Trivial Especial Cumpleaños</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />
    
    <script>
        (function() {
            window.lanzarFuegosArtificiales = function() {
                var script = document.createElement('script');
                script.src = "https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js";
                script.onload = function() {
                    let duration = 12 * 1000;
                    let animationEnd = Date.now() + duration;
                    let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };
                    function randomInRange(min, max) { return Math.random() * (max - min) + min; }
                    let interval = setInterval(function() {
                        let timeLeft = animationEnd - Date.now();
                        if (timeLeft <= 0) return clearInterval(interval);
                        let particleCount = 50 * (timeLeft / duration);
                        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                    }, 250);
                };
                document.body.appendChild(script);
            }
        })();
    </script>

    <style>
        :root {
            --bg-dark: #090514;
            --bg-card: #150f30;
            --accent: #ff007f; 
            --yellow-buzz: #ffd32a; 
            
            --btn-blue: #0984e3;
            --btn-orange: #e67e22;
            --btn-green: #2ecc71;
            --btn-yellow: #f1c40f;
            
            --color-ciencia: #27ae60;
            --color-geografia: #2980b9;
            --color-historia: #f1c40f;
            --color-arte: #8e44ad;
            --color-deportes: #d35400;
            --color-entretenimiento: #e67e22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 127, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(9, 132, 227, 0.2) 0%, transparent 50%);
            padding: 20px;
        }

        .game-wrapper {
            width: 1150px;
            height: 750px;
            background: var(--bg-card);
            border: 4px solid var(--yellow-buzz);
            box-shadow: 0 0 40px rgba(255, 211, 42, 0.2);
            border-radius: 24px;
            display: grid;
            grid-template-rows: 80px 1fr;
            overflow: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            color: var(--yellow-buzz);
        }

        .header-score {
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
        }

        .screen-container {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100%;
        }

        /* --- PRESENTADORA PERSONALIZADA (CUMPLEAÑERA) --- */
        .presenter-panel {
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 25px;
            position: relative;
        }

        .speech-bubble {
            background: #ffffff;
            color: #111;
            border-radius: 16px;
            padding: 15px;
            width: 290px;
            font-size: 0.95rem;
            font-weight: 700;
            position: absolute;
            top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            text-align: center;
            border: 3px solid var(--accent);
            z-index: 10;
        }

        .speech-bubble::after {
            content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            border-width: 15px 12px 0; border-style: solid; border-color: #ffffff transparent;
        }

        /* Contenedor circular de la foto */
        .birthday-host-frame {
            width: 210px;
            height: 210px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.5);
            overflow: hidden;
            margin-bottom: 70px;
            transition: transform 0.3s, filter 0.3s, border-color 0.3s, box-shadow 0.3s;
            background-color: #111;
        }

        .birthday-host-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Estados dinámicos de la cumpleañera */
        .birthday-host-frame.dance {
            animation: hostBounce 0.4s infinite alternate;
            border-color: #2ecc71;
            box-shadow: 0 0 35px rgba(46, 204, 113, 0.8);
            filter: grayscale(0%) contrast(1.1);
        }

        .birthday-host-frame.sad {
            animation: hostShiver 0.15s infinite;
            border-color: #718093;
            box-shadow: 0 0 15px rgba(113, 128, 147, 0.4);
            filter: grayscale(100%) brightness(0.7);
            transform: translateY(10px) rotate(4deg);
        }

        .birthday-host-frame.crazy {
            animation: hostJump 0.3s infinite alternate;
            border-color: var(--yellow-buzz);
            box-shadow: 0 0 40px rgba(255, 211, 42, 0.9);
            filter: grayscale(0%) saturate(1.4);
        }

        @keyframes hostBounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-15px) scale(1.03); } }
        @keyframes hostJump { from { transform: translateY(0) scale(1) rotate(-3deg); } to { transform: translateY(-30px) scale(1.06) rotate(3deg); } }
        @keyframes hostShiver { 0%, 100% { transform: translateX(0) translateY(10px) rotate(3deg); } 50% { transform: translateX(4px) translateY(10px) rotate(5deg); } }

        /* --- PANTALLAS --- */
        .screen { padding: 30px 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .hidden { display: none !important; }

        /* --- TABLERO EXCLUSIVO CON SVG --- */
        .wheel-container-svg {
            width: 380px;
            height: 380px;
            position: relative;
            margin-bottom: 25px;
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(255, 211, 42, 0.25));
        }

        .wheel-segment-clickable {
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            transform-origin: 200px 200px;
        }

        .wheel-segment-clickable:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        .wheel-segment-clickable.completed {
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .wheel-segment-clickable.completed path {
            fill: #221c38 !important;
            stroke: #110c22 !important;
        }
        
        .wheel-segment-clickable.completed text {
            fill: #443c5e !important;
            opacity: 0.5;
        }

        .wheel-svg-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 900;
            fill: #ffffff;
            text-anchor: middle;
            pointer-events: none;
            letter-spacing: 1px;
        }

        .wheel-svg-icon {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 20px;
            fill: #ffffff;
            text-anchor: middle;
            pointer-events: none;
        }

        /* --- BOTÓN PREGUNTA FINAL ESTILO BUZZ --- */
        .btn-final-trigger {
            background: radial-gradient(circle, #ff007f 0%, #c2005f 100%);
            color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            padding: 30px 50px;
            border: 5px solid var(--yellow-buzz);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.6), inset 0 0 15px rgba(255,255,255,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: pulseBtn 1.5s infinite;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-final-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 211, 42, 0.8), inset 0 0 20px rgba(255,255,255,0.8);
            background: radial-gradient(circle, #ff2a93 0%, #e6006f 100%);
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 0, 127, 0.6); }
            50% { transform: scale(1.03); box-shadow: 0 0 50px rgba(255, 0, 127, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 0, 127, 0.6); }
        }

        /* --- PREGUNTAS --- */
        .quiz-panel { display: flex; flex-direction: column; width: 100%; }
        #question-text { font-size: 1.6rem; font-weight: 700; margin-bottom: 25px; min-height: 70px; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        
        .answer-btn {
            border: 3px solid #000; border-radius: 12px; padding: 22px; font-size: 1.2rem; font-weight: 700;
            color: #fff; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 6px 0px #000000;
            text-align: left; display: flex; align-items: center;
        }
        .answer-btn::before { content: ''; width: 20px; height: 20px; border-radius: 50%; margin-right: 15px; border: 2px solid #fff; flex-shrink: 0; }
        .answer-btn:nth-child(1) { background: var(--btn-blue); }
        .answer-btn:nth-child(2) { background: var(--btn-orange); }
        .answer-btn:nth-child(3) { background: var(--btn-green); }
        .answer-btn:nth-child(4) { background: var(--btn-yellow); color: #000; }
        .answer-btn:nth-child(4)::before { border-color: #000; }

        .answer-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 0px #000000; }
        .answer-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .answer-btn.correct-choice { background-color: #2ecc71 !important; color: #fff !important; }
        .answer-btn.incorrect-choice { background-color: #e74c3c !important; color: #fff !important; }

        .btn-back { background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; }

        /* --- PREMIO FINAL --- */
        .prize-container {
            width: 320px; height: 440px; border: 5px solid var(--yellow-buzz); border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 35px rgba(255, 211, 42, 0.6); margin-bottom: 20px;
            background: #222; display: flex; justify-content: center; align-items: center;
        }
        .prize-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>

            ],
            arte: [
                { q: "¿Quién pintó la famosa obra de la 'Mona Lisa'?", a: ["Van Gogh", "Miguel Ángel", "Leonardo da Vinci", "Picasso"], c: 2 },
                { q: "Quién escribió la mítica novela 'Don Quijote de la Mancha'?", a: ["Lope de Vega", "Miguel de Cervantes", "Quevedo", "Góngora"], c: 1 },
                { q: "¿A qué movimiento artístico pertenecía Salvador Dalí?", a: ["Cubismo", "Impresionismo", "Surrealismo", "Expresionismo"], c: 2 },
                { q: "¿En qué ciudad se encuentra el famoso Museo del Louvre?", a: ["Londres", "París", "Roma", "Madrid"], c: 1 },
                { q: "¿Quién esculpió la colosal estatua del 'David'?", a: ["Donatello", "Miguel Ángel", "Bernini", "Rodin"], c: 1 }
            ],
            deportes: [
                { q: "¿Qué selección nacional ha levantado más Copas del Mundo de Fútbol?", a: ["Alemania", "Italia", "Brasil", "Argentina"], c: 2 },
                { q: "¿Quién ostenta el récord de más títulos individuales de Grand Slam masculinos?", a: ["Rafael Nadal", "Roger Federer", "Novak Djokovic", "Carlos Alcaraz"], c: 2 },
                { q: "¿Qué jugador europeo se convirtió en el primer jugador en la historia de la NBA en ganar el premio al Jugador Más Valioso (MVP) y el MVP de las Finales en la misma temporada?", a: ["Dirk Nowitzki", "Tony Parker", "Giannis Antennompo", "Pau Gasol"], c: 2 },
                { q: "¿Cuántas Champions League tiene el Real Madrid?", a: ["12", "13", "14", "15"], c: 3 },
                { q: "¿Quién es el máximo goleador en la historia de la Selección Española de Fútbol?", a: ["David Villa", "Fernando Torres", "Raúl González", "Álvaro Morata"], c: 0 }
            ],
            entretenimiento: [
                { q: "¿Qué cinta ganó el primer Óscar a Mejor Película de Animación?", a: ["Shrek", "Toy Story", "Monstruos S.A.", "Buscando a Nemo"], c: 0 },
                { q: "¿Cómo se llama el héroe protagonista de la saga 'The Legend of Zelda'?", a: ["Zelda", "Link", "Mario", "Ganondorf"], c: 1 },
                { q: "¿Qué mítica banda británica lanzó el álbum 'The Dark Side of the Moon'?", a: ["The Beatles", "Led Zeppelin", "Pink Floyd", "Queen"], c: 2 },
                { q: "¿Quién interpretó a Jack Dawson en la película Titanic?", a: ["Brad Pitt", "Leonardo DiCaprio", "Matt Damon", "Johnny Depp"], c: 1 },
                { q: "¿Cuál es la serie de televisión más reproducida en la historia de Netflix?", a: ["Stranger Things", "El Juego del Calamar", "La Casa de Papel", "Miercoles"], c: 1 }
            ],
            final: {
                q: "¿Cuál será el próximo concierto al que acudirá la cumpleañera?",
                a: ["Julio Iglesias", "Britney Spears", "Tino Casal", "Karol G"],
                c: 3
            }
        };

        let gameState = { 
            quesitos: { ciencia: false, geografia: false, historia: false, arte: false, deportes: false, entretenimiento: false }, 
            categoriaActual: null, indexPreguntaActual: 0, esPreguntaFinal: false 
        };

        const boardScreen = document.getElementById('board-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const endScreen = document.getElementById('end-screen');
        const wheelBox = document.getElementById('wheel-box');
        const segments = document.querySelectorAll('.wheel-segment-clickable');
        const questionText = document.getElementById('question-text');
        const answersContainer = document.getElementById('answers-container');
        const finalQuestionBtn = document.getElementById('final-question-btn');
        const backBtn = document.getElementById('back-btn');
        const presenterSpeech = document.getElementById('presenter-speech');
        const presenterFrame = document.getElementById('presenter-frame');
        const quesitosCountLabel = document.getElementById('quesitos-count');

        function setPresenterMood(mood, text) {
            if(!presenterSpeech || !presenterFrame) return;
            presenterSpeech.textContent = text;
            presenterFrame.className = "birthday-host-frame"; 
            if (mood === 'happy') presenterFrame.classList.add('dance');
            if (mood === 'sad') presenterFrame.classList.add('sad');
            if (mood === 'crazy') presenterFrame.classList.add('crazy');
        }

        segments.forEach(s => {
            s.addEventListener('click', () => {
                const cat = s.dataset.category;
                if (gameState.quesitos[cat]) return;
                iniciarCategoria(cat);
            });
        });

        if(finalQuestionBtn) {
            finalQuestionBtn.addEventListener('click', () => iniciarPreguntaFinal());
        }

        function iniciarCategoria(cat) {
            gameState.categoriaActual = cat;
            gameState.indexPreguntaActual = 0;
            gameState.esPreguntaFinal = false;
            setPresenterMood('happy', `¡A por el quesito de ${cat.toUpperCase()}! Sé que os la sabéis.`);
            
            boardScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            backBtn.classList.add('hidden');
            mostrarPregunta();
        }

        function mostrarPregunta() {
            answersContainer.innerHTML = '';
            let data = gameState.esPreguntaFinal ? quizData.final : quizData[gameState.categoriaActual][gameState.indexPreguntaActual];
            questionText.textContent = data.q;

            data.a.forEach((text, idx) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = text;
                btn.addEventListener('click', () => verificarRespuesta(idx, data.c, btn));
                answersContainer.appendChild(btn);
            });
        }

        function verificarRespuesta(sel, corr, btn) {
            const buttons = answersContainer.querySelectorAll('.answer-btn');

            if (sel === corr) {
                btn.classList.add('correct-choice');
                buttons.forEach(b => b.disabled = true);

                if (gameState.esPreguntaFinal) {
                    setPresenterMood('crazy', "¡SÍ! ¡BRUTAL! ¡NOS VAMOS AL CONCIERTO DE KAROL G EN SEVILLA!");
                    if (typeof lanzarFuegosArtificiales === 'function') lanzarFuegosArtificiales();
                    setTimeout(() => mostrarPremioFinal(), 2000);
                } else {
                    gameState.quesitos[gameState.categoriaActual] = true;
                    setPresenterMood('happy', "¡Toma ya! ¡Respuesta correcta, sumamos un quesito!");
                    actualizarTableroUI(gameState.categoriaActual);
                    setTimeout(() => volverAlTablero(), 1500);
                }
            } else {
                btn.classList.add('incorrect-choice');
                if (gameState.esPreguntaFinal) {
                    btn.disabled = true;
                    setPresenterMood('sad', "¡Noooo! Ese no es mi concierto... ¡Pensad bien antes de pulsar!");
                } else {
                    buttons.forEach(b => b.disabled = true);
                    gameState.indexPreguntaActual++;
                    setPresenterMood('sad', "¡Nooo! Esa no era... Me habéis fallado esta vez.");

                    if (gameState.indexPreguntaActual < quizData[gameState.categoriaActual].length) {
                        setTimeout(() => mostrarPregunta(), 1500);
                    } else {
                        setTimeout(() => {
                            setPresenterMood('sad', "Vaya, os habéis quedado sin preguntas en este quesito. ¡Volved al tablero!");
                            backBtn.classList.remove('hidden');
                            backBtn.onclick = volverAlTablero;
                        }, 1000);
                    }
                }
            }
        }

        function actualizarTableroUI(cat) {
            const segment = document.querySelector(`.wheel-segment-clickable[data-category="${cat}"]`);
            if(segment) {
                segment.classList.add('completed');
            }
            
            const total = Object.values(gameState.quesitos).filter(v => v === true).length;
            quesitosCountLabel.textContent = `Quesitos: ${total} / 6`;

            if (total === 6) {
                setTimeout(() => {
                    wheelBox.classList.add('hidden');
                    finalQuestionBtn.classList.remove('hidden');
                    setPresenterMood('crazy', "¡Increíble! ¡Tenéis los 6 quesitos! Pulsad el gran botón rojo... ¡Llegó mi pregunta definitiva!");
                }, 1000);
            }
        }

        function volverAlTablero() {
            quizScreen.classList.add('hidden');
            boardScreen.classList.remove('hidden');
        }

        function iniciarPreguntaFinal() {
            gameState.esPreguntaFinal = true;
            boardScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            backBtn.classList.add('hidden');
            setPresenterMood('happy', "¡Llegó el momento! Si acertáis esto... hay regalo gordo.");
            mostrarPregunta();
        }

        function mostrarPremioFinal() {
            quizScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            
            try {
                const audioPremio = new Audio('cancion.mp3');
                audioPremio.volume = 0.7;
                audioPremio.play().catch(e => console.log("Audio esperando interactividad."));
            } catch(e) {
                console.log("No se pudo iniciar el audio.");
            }
        }
    </script>
</body>
</html>
