<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUZZ! - Trivial Especial Cumpleaños</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-dark: #090514;
            --bg-card: #150f30;
            --accent: #ff007f; 
            --yellow-buzz: #ffd32a; 
            
            --btn-blue: #0984e3;
            --btn-orange: #e67e22;
            --btn-green: #2ecc71;
            --btn-yellow: #f1c40f;
            
            /* Colores Oficiales Trivial Pursuit */
            --color-geografia: #2980b9;      /* Azul */
            --color-entretenimiento: #e67e22;/* Rosa/Naranja */
            --color-historia: #f1c40f;       /* Amarillo */
            --color-arte: #8e44ad;           /* Morado */
            --color-ciencia: #27ae60;        /* Verde */
            --color-deportes: #d35400;       /* Marrón/Naranja Oscuro */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 127, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(9, 132, 227, 0.2) 0%, transparent 50%);
        }

        .qr-panel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #qrcode { background: white; padding: 5px; border-radius: 4px; }

        .game-wrapper {
            width: 1150px;
            height: 750px;
            background: var(--bg-card);
            border: 4px solid var(--yellow-buzz);
            box-shadow: 0 0 40px rgba(255, 211, 42, 0.2);
            border-radius: 24px;
            display: grid;
            grid-template-rows: 80px 1fr;
            overflow: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            color: var(--yellow-buzz);
        }

        .header-score {
            font-size: 1rem;
            font-weight: 700;
            background: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
        }

        .screen-container {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: 100%;
        }

        /* --- PRESENTADOR ANIMADO --- */
        .presenter-panel {
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 20px;
            position: relative;
        }

        .speech-bubble {
            background: #ffffff;
            color: #111;
            border-radius: 16px;
            padding: 15px;
            width: 290px;
            font-size: 0.95rem;
            font-weight: 700;
            position: absolute;
            top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            text-align: center;
            border: 3px solid var(--accent);
            z-index: 10;
        }

        .speech-bubble::after {
            content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            border-width: 15px 12px 0; border-style: solid; border-color: #ffffff transparent;
        }

        .character-3d { width: 180px; height: 320px; position: relative; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .p-hat { width: 70px; height: 45px; background: #222; border-radius: 8px 8px 0 0; position: absolute; top: -25px; border: 3px solid #000; box-shadow: inset 0 -8px 0 var(--accent); }
        .p-head { width: 85px; height: 85px; background: #ffd32a; border-radius: 50%; border: 3px solid #000; position: relative; z-index: 3; }
        .p-glasses { width: 75px; height: 30px; position: absolute; top: 25px; left: 2px; display: flex; justify-content: space-between; }
        .p-lens { width: 34px; height: 30px; background: var(--accent); border: 3px solid #000; border-radius: 10px; }
        .p-mouth { width: 34px; height: 16px; background: #000; border-radius: 0 0 17px 17px; position: absolute; bottom: 12px; left: 23px; }
        .p-body { width: 90px; height: 120px; background: #44bd32; border: 3px solid #000; border-radius: 25px 25px 10px 10px; margin-top: -10px; position: relative; z-index: 2; }
        .p-tie { width: 30px; height: 30px; background: #ff007f; clip-path: polygon(0 0, 100% 0, 50% 100%); margin: 10px auto; }
        .p-arm { width: 24px; height: 90px; background: #353b48; border: 3px solid #000; border-radius: 12px; position: absolute; top: 85px; transform-origin: top center; }
        .p-arm.left { left: -15px; transform: rotate(15deg); }
        .p-arm.right { right: -15px; transform: rotate(-15deg); }
        .p-leg { width: 26px; height: 90px; background: #2f3640; border: 3px solid #000; position: absolute; bottom: 40px; }
        .p-leg.left { left: 15px; }
        .p-leg.right { right: 15px; }
        .p-shadow { width: 120px; height: 12px; background: rgba(0,0,0,0.4); border-radius: 50%; position: absolute; bottom: 25px; }

        .character-3d.dance { animation: hostBounce 0.4s infinite alternate; }
        .character-3d.dance .p-arm.left { animation: armWaveL 0.4s infinite alternate; }
        .character-3d.dance .p-arm.right { animation: armWaveR 0.4s infinite alternate; }
        .character-3d.sad { animation: hostShiver 0.1s infinite; }
        .character-3d.sad .p-lens { background: #718093; }
        .character-3d.sad .p-mouth { border-radius: 17px 17px 0 0; height: 10px; bottom: 18px; }
        .character-3d.crazy { animation: hostJump 0.3s infinite alternate; }

        @keyframes hostBounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
        @keyframes armWaveL { from { transform: rotate(15deg); } to { transform: rotate(140deg); } }
        @keyframes armWaveR { from { transform: rotate(-15deg); } to { transform: rotate(-140deg); } }
        @keyframes hostShiver { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(3px); } }
        @keyframes hostJump { from { transform: translateY(0); } to { transform: translateY(-25px); } }

        /* --- PANTALLAS --- */
        .screen { padding: 30px 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .hidden { display: none !important; }

        /* --- TABLERO RUEDA DE 6 QUESITOS --- */
        .trivial-wheel {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 10px solid var(--yellow-buzz);
            position: relative;
            box-shadow: 0 0 35px rgba(255, 211, 42, 0.4);
            margin-bottom: 30px;
            background: conic-gradient(
                var(--color-ciencia) 0deg 60deg,
                var(--color-geografia) 60deg 120deg,
                var(--color-historia) 120deg 180deg,
                var(--color-arte) 180deg 240deg,
                var(--color-deportes) 240deg 300deg,
                var(--color-entretenimiento) 300deg 360deg
            );
            overflow: hidden;
        }

        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .segment-1 { top: 0; left: 0; transform: rotate(30deg) skewY(30deg); }
        .segment-2 { top: 0; left: 0; transform: rotate(90deg) skewY(30deg); }
        .segment-3 { top: 0; left: 0; transform: rotate(150deg) skewY(30deg); }
        .segment-4 { top: 0; left: 0; transform: rotate(210deg) skewY(30deg); }
        .segment-5 { top: 0; left: 0; transform: rotate(270deg) skewY(30deg); }
        .segment-6 { top: 0; left: 0; transform: rotate(330deg) skewY(30deg); }

        .segment-content {
            transform: skewY(-30deg) rotate(-30deg) translate(35px, 35px);
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: 900;
            font-size: 0.75rem;
            text-align: center;
            text-transform: uppercase;
            pointer-events: none;
        }
        
        .segment-3 .segment-content { color: #000; text-shadow: none; }
        .wheel-segment:hover { filter: brightness(1.3); }

        .wheel-segment.completed {
            background: #222 !important;
            filter: none !important;
            cursor: not-allowed;
        }
        .wheel-segment.completed .segment-content {
            color: var(--yellow-buzz) !important;
            text-shadow: 0 0 5px rgba(255,211,42,0.5);
        }

        .wheel-center {
            position: absolute;
            width: 50px; height: 50px;
            background: var(--bg-card);
            border: 4px solid var(--yellow-buzz);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .btn-final-trigger {
            background: linear-gradient(135deg, #ff007f, #ff5e62); color: #fff; border: none; padding: 18px 40px;
            font-size: 1.3rem; font-weight: 900; border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px rgba(255, 0, 127, 0.5);
            text-transform: uppercase; animation: pulseBtn 1.2s infinite;
        }

        /* --- PREGUNTAS Y RESPUESTAS --- */
        .quiz-panel { display: flex; flex-direction: column; width: 100%; }
        #question-text { font-size: 1.6rem; font-weight: 700; margin-bottom: 25px; min-height: 70px; }
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        
        .answer-btn {
            border: 3px solid #000; border-radius: 12px; padding: 22px; font-size: 1.2rem; font-weight: 700;
            color: #fff; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 6px 0px #000000;
            text-align: left; display: flex; align-items: center;
        }
        .answer-btn::before { content: ''; width: 20px; height: 20px; border-radius: 50%; margin-right: 15px; border: 2px solid #fff; flex-shrink: 0; }
        .answer-btn:nth-child(1) { background: var(--btn-blue); }
        .answer-btn:nth-child(2) { background: var(--btn-orange); }
        .answer-btn:nth-child(3) { background: var(--btn-green); }
        .answer-btn:nth-child(4) { background: var(--btn-yellow); color: #000; }
        .answer-btn:nth-child(4)::before { border-color: #000; }

        .answer-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 0px #000000; }
        .answer-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .answer-btn.correct-choice { background-color: #2ecc71 !important; color: #fff !important; }
        .answer-btn.incorrect-choice { background-color: #e74c3c !important; color: #fff !important; }

        .btn-back { background: rgba(255,255,255,0.1); color: white; border: none; padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer; }

        /* --- PREMIO FINAL --- */
        .prize-container {
            max-width: 320px; max-height: 440px; border: 5px solid var(--yellow-buzz); border-radius: 15px;
            overflow: hidden; box-shadow: 0 0 35px rgba(255, 211, 42, 0.6); margin-bottom: 20px;
            animation: prizePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .prize-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        @keyframes prizePop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

    <div class="qr-panel">
        <div>
            <h4 style="font-size:0.85rem; color:var(--yellow-buzz);">¡Escanea para Jugar!</h4>
            <p style="font-size: 0.75rem; color: #aaa;">Acceso rápido para los invitados</p>
        </div>
        <div id="qrcode"></div>
    </div>

    <div class="game-wrapper">
        <header>
            <h1>BUZZ! x TRIVIAL PURSUIT</h1>
            <div class="header-score" id="quesitos-count">Quesitos: 0 / 6</div>
        </header>

        <div class="screen-container">
            <!-- PANEL PRESENTADOR -->
            <div class="presenter-panel">
                <div class="speech-bubble" id="presenter-speech">¡Bienvenidos! Conseguid los 6 quesitos del Trivial para llegar a la pregunta sobre la cumpleañera.</div>
                <div class="character-3d" id="presenter-char">
                    <div class="p-hat"></div>
                    <div class="p-head">
                        <div class="p-glasses"><div class="p-lens"></div><div class="p-lens"></div></div>
                        <div class="p-mouth"></div>
                    </div>
                    <div class="p-body"><div class="p-tie"></div></div>
                    <div class="p-arm left"></div><div class="p-arm right"></div>
                    <div class="p-leg left"></div><div class="p-leg right"></div>
                    <div class="p-shadow"></div>
                </div>
            </div>

            <!-- CONTENEDOR JUEGO -->
            <main style="position: relative;">
                <!-- TABLERO -->
                <section id="board-screen" class="screen">
                    <div class="trivial-wheel" id="wheel">
                        <div class="wheel-segment segment-1" data-category="ciencia"><div class="segment-content"><i class="fa-solid fa-flask"></i><br>Ciencia</div></div>
                        <div class="wheel-segment segment-2" data-category="geografia"><div class="segment-content"><i class="fa-solid fa-earth-americas"></i><br>Geografía</div></div>
                        <div class="wheel-segment segment-3" data-category="historia"><div class="segment-content"><i class="fa-solid fa-landmark"></i><br>Historia</div></div>
                        <div class="wheel-segment segment-4" data-category="arte"><div class="segment-content"><i class="fa-solid fa-palette"></i><br>Arte</div></div>
                        <div class="wheel-segment segment-5" data-category="deportes"><div class="segment-content"><i class="fa-solid fa-volleyball"></i><br>Deportes</div></div>
                        <div class="wheel-segment segment-6" data-category="entretenimiento"><div class="segment-content"><i class="fa-solid fa-film"></i><br>Cine</div></div>
                        <div class="wheel-center"></div>
                    </div>
                    <button id="final-question-btn" class="btn-final-trigger hidden">¡PREGUNTA FINAL DE CUMPLEAÑOS!</button>
                </section>

                <!-- CONCURSO -->
                <section id="quiz-screen" class="screen hidden">
                    <div class="quiz-panel">
                        <div id="question-text">Pregunta</div>
                        <div id="answers-container" class="answers-grid"></div>
                        <button id="back-btn" class="btn-back hidden">Volver al tablero</button>
                    </div>
                </section>

                <!-- PREMIO -->
                <section id="end-screen" class="screen hidden">
                    <div class="prize-container">
                        <!-- Referencia exacta a la imagen local guardada -->
                        <img src="premio.png" alt="¡Premio Especial Karol G!" onerror="this.style.display='none'; alert('Coloca tu archivo ChatGPT Image 2 jun 2026, 10_07_12.png renombrado a premio.png en la carpeta.')">
                    </div>
                    <h2 style="color: var(--yellow-buzz); margin-bottom: 10px; font-size: 1.8rem;">¡ENTRADAS CONSEGUIDAS!</h2>
                    <button class="btn-restart" style="background:var(--accent); color:white; padding:10px 20px; border:none; border-radius:20px; font-weight:bold; cursor:pointer;" onclick="location.reload()">Volver a jugar</button>
                </section>
            </main>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE PREGUNTAS ---
        const quizData = {
            ciencia: [
                { q: "¿Cuál es el elemento químico más abundante en el universo?", a: ["Oxígeno", "Hidrógeno", "Helio", "Carbono"], c: 1 },
                { q: "¿Qué órgano de nuestro cuerpo produce la hormona insulina?", a: ["Hígado", "Páncreas", "Riñón", "Bazo"], c: 1 },
                { q: "¿Cuál es la velocidad de la luz de forma aproximada?", a: ["300.000 km/s", "150.000 km/s", "1.000.000 km/s", "30.000 km/s"], c: 0 },
                { q: "¿Qué planeta de nuestro sistema solar es apodado el Planeta Rojo?", a: ["Júpiter", "Saturno", "Marte", "Venus"], c: 2 },
                { q: "¿Cuál de estos símbolos representa al elemento químico Oro?", a: ["Fe", "Au", "Ag", "O"], c: 1 },
                { q: "¿Qué científico revolucionó el mundo con la teoría de la relatividad?", a: ["Isaac Newton", "Nikola Tesla", "Albert Einstein", "Galileo Galilei"], c: 2 }
            ],
            geografia: [
                { q: "¿Cuál es el río más largo del mundo?", a: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1 },
                { q: "¿Cuál es la capital oficial de Australia?", a: ["Sídney", "Melbourne", "Canberra", "Brisbane"], c: 2 },
                { q: "¿En qué océano se encuentra la fosa de las Marianas?", a: ["Atlántico", "Pacífico", "Índico", "Ártico"], c: 1 },
                { q: "¿Qué país tiene forma de bota en el mapa de Europa?", a: ["España", "Grecia", "Italia", "Portugal"], c: 2 },
                { q: "¿Cuál es el desierto más cálido y grande del planeta?", a: ["Gobi", "Sáhara", "Kalahari", "Atacama"], c: 1 },
                { q: "¿Qué cordillera separa Europa de Asia?", a: ["Los Alpes", "Los Andes", "Los Urales", "El Himalaya"], c: 2 }
            ],
            historia: [
                { q: "¿En qué año cayó el Imperio Romano de Occidente?", a: ["476 d.C.", "1492 d.C.", "395 d.C.", "711 d.C."], c: 0 },
                { q: "¿Quién fue el primer presidente de los Estados Unidos?", a: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"], c: 2 },
                { q: "¿Qué reina financió el viaje de Cristóbal Colón?", a: ["Isabel la Católica", "Juana la Loca", "María de Médici", "Isabel II"], c: 0 },
                { q: "¿En qué país nació Adolf Hitler?", a: ["Alemania", "Austria", "Polonia", "Hungría"], c: 1 },
                { q: "¿Qué civilización construyó las ruinas de Machu Picchu?", a: ["Mayas", "Aztecas", "Incas", "Olmecas"], c: 2 },
                { q: "¿Cuánto duró en realidad la Guerra de los Cien Años?", a: ["100 años", "116 años", "99 años", "150 años"], c: 1 }
            ],
            arte: [
                { q: "¿Quién pintó la famosa obra de la 'Mona Lisa'?", a: ["Van Gogh", "Miguel Ángel", "Leonardo da Vinci", "Picasso"], c: 2 },
                { q: "¿Quién wrote la mítica novela 'Don Quijote de la Mancha'?", a: ["Lope de Vega", "Miguel de Cervantes", "Quevedo", "Góngora"], c: 1 },
                { q: "¿A qué movimiento artístico pertenecía Salvador Dalí?", a: ["Cubismo", "Impresionismo", "Surrealismo", "Expresionismo"], c: 2 },
                { q: "¿En qué ciudad se encuentra el famoso Museo del Louvre?", a: ["Londres", "París", "Roma", "Madrid"], c: 1 },
                { q: "¿Quién esculpió la colosal estatua del 'David'?", a: ["Donatello", "Miguel Ángel", "Bernini", "Rodin"], c: 1 },
                { q: "What was Vincent van Gogh's nationality?", a: ["Francés", "Alemán", "Neerlandés", "Belga"], c: 2 }
            ],
            deportes: [
                { q: "¿Qué selección nacional ha levantado más Copas del Mundo de Fútbol?", a: ["Alemania", "Italia", "Brasil", "Argentina"], c: 2 },
                { q: "¿Quién ostenta el récord de más títulos individuales de Grand Slam masculinos?", a: ["Rafael Nadal", "Roger Federer", "Novak Djokovic", "Carlos Alcaraz"], c: 2 },
                { q: "¿Qué jugador europeo se convirtió en el primer jugador en la historia de la NBA en ganar el premio al Jugador Más Valioso (MVP) y el MVP de las Finales en la misma temporada?", a: ["Dirk Nowitzki", "Tony Parker", "Giannis Antetokounmpo", "Pau Gasol"], c: 2 },
                { q: "¿Cuántas Champions League tiene el Real Madrid?", a: ["12", "13", "14", "15"], c: 3 },
                { q: "¿Quién es el máximo goleador en la historia de la Selección Española de Fútbol?", a: ["David Villa", "Fernando Torres", "Raúl González", "Álvaro Morata"], c: 0 }
            ],
            entretenimiento: [
                { q: "¿Qué cinta ganó el primer Óscar a Mejor Película de Animación?", a: ["Shrek", "Toy Story", "Monstruos S.A.", "Buscando a Nemo"], c: 0 },
                { q: "¿Cómo se llama el héroe protagonista de la saga 'The Legend of Zelda'?", a: ["Zelda", "Link", "Mario", "Ganondorf"], c: 1 },
                { q: "¿Qué mítica banda británica lanzó el álbum 'The Dark Side of the Moon'?", a: ["The Beatles", "Led Zeppelin", "Pink Floyd", "Queen"], c: 2 },
                { q: "¿Quién interpretó a Jack Dawson en la película Titanic?", a: ["Brad Pitt", "Leonardo DiCaprio", "Matt Damon", "Johnny Depp"], c: 1 },
                { q: "¿Cuál es la serie de televisión más reproducida en la historia de Netflix?", a: ["Stranger Things", "El Juego del Calamar", "La Casa de Papel", "Miercoles"], c: 1 },
                { q: "¿En qué histórico año se estrenó la primera película de Star Wars?", a: ["1975", "1977", "1980", "1983"], c: 1 }
            ],
            final: {
                q: "¿Cuál será el próximo concierto al que acudirá la cumpleañera?",
                a: ["Julio Iglesias", "Britney Spears", "Tino Casal", "Karol G"],
                c: 3
            }
        };

        let gameState = { 
            quesitos: { ciencia: false, geografia: false, historia: false, arte: false, deportes: false, entretenimiento: false }, 
            categoriaActual: null, indexPreguntaActual: 0, esPreguntaFinal: false 
        };

        const boardScreen = document.getElementById('board-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const endScreen = document.getElementById('end-screen');
        const wheel = document.getElementById('wheel');
        const segments = document.querySelectorAll('.wheel-segment');
        const questionText = document.getElementById('question-text');
        const answersContainer = document.getElementById('answers-container');
        const finalQuestionBtn = document.getElementById('final-question-btn');
        const backBtn = document.getElementById('back-btn');
        const presenterSpeech = document.getElementById('presenter-speech');
        const presenterChar = document.getElementById('presenter-char');
        const quesitosCountLabel = document.getElementById('quesitos-count');

        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 70, height: 70 });

        function setPresenterMood(mood, text) {
            presenterSpeech.textContent = text;
            presenterChar.className = "character-3d"; 
            if (mood === 'happy') presenterChar.classList.add('dance');
            if (mood === 'sad') presenterChar.classList.add('sad');
            if (mood === 'crazy') presenterChar.classList.add('crazy');
        }

        segments.forEach(s => {
            s.addEventListener('click', () => {
                const cat = s.dataset.category;
                if (gameState.quesitos[cat]) return;
                iniciarCategoria(cat);
            });
        });

        finalQuestionBtn.addEventListener('click', () => iniciarPreguntaFinal());

        function iniciarCategoria(cat) {
            gameState.categoriaActual = cat;
            gameState.indexPreguntaActual = 0;
            gameState.esPreguntaFinal = false;
            setPresenterMood('happy', `¡A por el quesito de ${cat.toUpperCase()}! Mucha suerte.`);
            
            boardScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            backBtn.classList.add('hidden');
            mostrarPregunta();
        }

        function mostrarPregunta() {
            answersContainer.innerHTML = '';
            let data = gameState.esPreguntaFinal ? quizData.final : quizData[gameState.categoriaActual][gameState.indexPreguntaActual];
            questionText.textContent = data.q;

            data.a.forEach((text, idx) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = text;
                btn.addEventListener('click', () => verificarRespuesta(idx, data.c, btn));
                answersContainer.appendChild(btn);
            });
        }

        function verificarRespuesta(sel, corr, btn) {
            const buttons = answersContainer.querySelectorAll('.answer-btn');

            if (sel === corr) {
                btn.classList.add('correct-choice');
                buttons.forEach(b => b.disabled = true);

                if (gameState.esPreguntaFinal) {
                    setPresenterMood('crazy', "¡SI! ¡BRUTAL! ¡LA RESPUESTA CORRECTA ERA KAROL G! ¡NOS VAMOS A SEVILLA!");
                    lanzarFuegosArtificiales();
                    setTimeout(() => mostrarPremioFinal(), 2000);
                } else {
                    gameState.quesitos[gameState.categoriaActual] = true;
                    setPresenterMood('happy', "¡Espectacular! ¡Has ganado la porción!");
                    actualizarTableroUI(gameState.categoriaActual);
                    setTimeout(() => volverAlTablero(), 1500);
                }
            } else {
                btn.classList.add('incorrect-choice');
                if (gameState.esPreguntaFinal) {
                    btn.disabled = true;
                    setPresenterMood('sad', "¡Ay va! Ese no es el concierto... ¡Sigue probando con los botones libres!");
                } else {
                    buttons.forEach(b => b.disabled = true);
                    gameState.indexPreguntaActual++;
                    setPresenterMood('sad', "¡Respuesta incorrecta! Vaya fallo.");

                    if (gameState.indexPreguntaActual < quizData[gameState.categoriaActual].length) {
                        setTimeout(() => mostrarPregunta(), 1500);
                    } else {
                        setTimeout(() => {
                            setPresenterMood('sad', "Has agotado las preguntas de esta categoría. ¡Regresa al tablero y elige otra!");
                            backBtn.classList.remove('hidden');
                            backBtn.onclick = volverAlTablero;
                        }, 1000);
                    }
                }
            }
        }

        function actualizarTableroUI(cat) {
            const segment = document.querySelector(`.wheel-segment[data-category="${cat}"]`);
            segment.classList.add('completed');
            
            const total = Object.values(gameState.quesitos).filter(v => v === true).length;
            quesitosCountLabel.textContent = `Quesitos: ${total} / 6`;

            if (total === 6) {
                setTimeout(() => {
                    wheel.classList.add('hidden');
                    finalQuestionBtn.classList.remove('hidden');
                    setPresenterMood('crazy', "¡Increíble, tienes los 6 quesitos del Trivial! ¡Desbloqueaste la Gran Pregunta Final de Cumpleaños!");
                }, 1000);
            }
        }

        function volverAlTablero() {
            quizScreen.classList.add('hidden');
            boardScreen.classList.remove('hidden');
        }

        function iniciarPreguntaFinal() {
            gameState.esPreguntaFinal = true;
            boardScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            backBtn.classList.add('hidden');
            setPresenterMood('happy', "¡Llegó el momento de la verdad!");
            mostrarPregunta();
        }

        function lanzarFuegosArtificiales() {
            let duration = 12 * 1000;
            let animationEnd = Date.now() + duration;
            let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            let interval = setInterval(function() {
                let timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                let particleCount = 50 * (timeLeft / duration);
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);
        }

        function mostrarPremioFinal() {
            quizScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            
            const audioPremio = new Audio('cancion.mp3');
            audioPremio.volume = 0.7;
            audioPremio.play().catch(e => console.log("Audio en espera de interacción."));
        }
    </script>
</body>
</html>
