<script>
    // --- BASE DE DATOS DE PREGUNTAS ---
    const quizData = {
        ciencia: [
            { q: "¿Cuál es el elemento químico más abundante en el universo?", a: ["Oxígeno", "Hidrógeno", "Helio", "Carbono"], c: 1 },
            { q: "¿Qué órgano de nuestro cuerpo produce la hormona insulina?", a: ["Hígado", "Páncreas", "Riñón", "Bazo"], c: 1 },
            { q: "¿Cuál es la velocidad de la luz de forma aproximada?", a: ["300.000 km/s", "150.000 km/s", "1.000.000 km/s", "30.000 km/s"], c: 0 },
            { q: "¿Qué planeta de nuestro sistema solar es apodado el Planeta Rojo?", a: ["Júpiter", "Saturno", "Marte", "Venus"], c: 2 },
            { q: "¿Cuál de estos símbolos representa al elemento químico Oro?", a: ["Fe", "Au", "Ag", "O"], c: 1 },
            { q: "¿Qué científico revolucionó el mundo con la teoría de la relatividad?", a: ["Isaac Newton", "Nikola Tesla", "Albert Einstein", "Galileo Galilei"], c: 2 }
        ],
        geografia: [
            { q: "¿Cuál es el río más largo del mundo?", a: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1 },
            { q: "¿Cuál es la capital oficial de Australia?", a: ["Sídney", "Melbourne", "Canberra", "Brisbane"], c: 2 },
            { q: "¿En qué océano se encuentra la fosa de las Marianas?", a: ["Atlántico", "Pacífico", "Índico", "Ártico"], c: 1 },
            { q: "¿Qué país tiene forma de bota en el mapa de Europa?", a: ["España", "Grecia", "Italia", "Portugal"], c: 2 },
            { q: "¿Cuál es el desierto más cálido y grande del planeta?", a: ["Gobi", "Sáhara", "Kalahari", "Atacama"], c: 1 },
            { q: "¿Qué cordillera separa Europa de Asia?", a: ["Los Alpes", "Los Andes", "Los Urales", "El Himalaya"], c: 2 }
        ],
        historia: [
            { q: "¿En qué año cayó el Imperio Romano de Occidente?", a: ["476 d.C.", "1492 d.C.", "395 d.C.", "711 d.C."], c: 0 },
            { q: "¿Quién fue el primer presidente de los Estados Unidos?", a: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"], c: 2 },
            { q: "¿Qué reina financió el viaje de Cristóbal Colón?", a: ["Isabel la Católica", "Juana la Loca", "María de Médici", "Isabel II"], c: 0 },
            { q: "¿En qué país nació Adolf Hitler?", a: ["Alemania", "Austria", "Polonia", "Hungría"], c: 1 },
            { q: "¿Qué civilización construyó las ruinas de Machu Picchu?", a: ["Mayas", "Aztecas", "Incas", "Olmecas"], c: 2 },
            { q: "¿Cuánto duró en realidad la Guerra de los Cien Años?", a: ["100 años", "116 años", "99 años", "150 años"], c: 1 }
        ],
        arte: [
            { q: "¿Quién pintó la famosa obra de la 'Mona Lisa'?", a: ["Van Gogh", "Miguel Ángel", "Leonardo da Vinci", "Picasso"], c: 2 },
            { q: "¿Quién escribió la mítica novela 'Don Quijote de la Mancha'?", a: ["Lope de Vega", "Miguel de Cervantes", "Quevedo", "Góngora"], c: 1 },
            { q: "¿A qué movimiento artístico pertenecía Salvador Dalí?", a: ["Cubismo", "Impresionismo", "Surrealismo", "Expresionismo"], c: 2 },
            { q: "¿En qué ciudad se encuentra el famoso Museo del Louvre?", a: ["Londres", "París", "Roma", "Madrid"], c: 1 },
            { q: "¿Quién esculpió la colosal estatua del 'David'?", a: ["Donatello", "Miguel Ángel", "Bernini", "Rodin"], c: 1 },
            { q: "¿De qué nacionalidad era el pintor Vincent van Gogh?", a: ["Francés", "Alemán", "Neerlandés", "Belga"], c: 2 }
        ],
        deportes: [
            { q: "¿Qué selección nacional ha levantado más Copas del Mundo de Fútbol?", a: ["Alemania", "Italia", "Brasil", "Argentina"], c: 2 },
            { q: "¿Quién ostenta el récord de más títulos individuales de Grand Slam masculinos?", a: ["Rafael Nadal", "Roger Federer", "Novak Djokovic", "Carlos Alcaraz"], c: 2 },
            { q: "¿Qué jugador europeo se convirtió en el primer jugador en la historia de la NBA en ganar el premio al Jugador Más Valioso (MVP) y el MVP de las Finales en la misma temporada?", a: ["Dirk Nowitzki", "Tony Parker", "Giannis Antetokounmpo", "Pau Gasol"], c: 2 },
            { q: "¿Cuántas Champions League tiene el Real Madrid?", a: ["12", "13", "14", "15"], c: 3 },
            { q: "¿Quién es el máximo goleador en la historia de la Selección Española de Fútbol?", a: ["David Villa", "Fernando Torres", "Raúl González", "Álvaro Morata"], c: 0 }
        ],
        entretenimiento: [
            { q: "¿Qué cinta ganó el primer Óscar a Mejor Película de Animación?", a: ["Shrek", "Toy Story", "Monstruos S.A.", "Buscando a Nemo"], c: 0 },
            { q: "¿Cómo se llama el héroe protagonista de la saga 'The Legend of Zelda'?", a: ["Zelda", "Link", "Mario", "Ganondorf"], c: 1 },
            { q: "¿Qué mítica banda británica lanzó el álbum 'The Dark Side of the Moon'?", a: ["The Beatles", "Led Zeppelin", "Pink Floyd", "Queen"], c: 2 },
            { q: "¿Quién interpretó a Jack Dawson en la película Titanic?", a: ["Brad Pitt", "Leonardo DiCaprio", "Matt Damon", "Johnny Depp"], c: 1 },
            { q: "¿Cuál es la serie de televisión más reproducida en la historia de Netflix?", a: ["Stranger Things", "El Juego del Calamar", "La Casa de Papel", "Miercoles"], c: 1 },
            { q: "¿En qué histórico año se estrenó la primera película de Star Wars?", a: ["1975", "1977", "1980", "1983"], c: 1 }
        ],
        final: {
            q: "¿Cuál será el próximo concierto al que acudirá la cumpleañera?",
            a: ["Julio Iglesias", "Britney Spears", "Tino Casal", "Karol G"],
            c: 3
        }
    };

    let gameState = { 
        quesitos: { ciencia: false, geografia: false, historia: false, arte: false, deportes: false, entretenimiento: false }, 
        categoriaActual: null, indexPreguntaActual: 0, esPreguntaFinal: false 
    };

    const boardScreen = document.getElementById('board-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const endScreen = document.getElementById('end-screen');
    const wheel = document.getElementById('wheel');
    const segments = document.querySelectorAll('.wheel-segment');
    const questionText = document.getElementById('question-text');
    const answersContainer = document.getElementById('answers-container');
    const finalQuestionBtn = document.getElementById('final-question-btn');
    const backBtn = document.getElementById('back-btn');
    const presenterSpeech = document.getElementById('presenter-speech');
    const presenterChar = document.getElementById('presenter-char');
    const quesitosCountLabel = document.getElementById('quesitos-count');

    // --- CÓDIGO QR CORREGIDO CON TU DIRECCIÓN DE GITHUB PAGES ---
    new QRCode(document.getElementById("qrcode"), { 
        text: "https://lmleran-ctrl.github.io/Quiz/", 
        width: 70, 
        height: 70 
    });

    function setPresenterMood(mood, text) {
        presenterSpeech.textContent = text;
        presenterChar.className = "character-3d"; 
        if (mood === 'happy') presenterChar.classList.add('dance');
        if (mood === 'sad') presenterChar.classList.add('sad');
        if (mood === 'crazy') presenterChar.classList.add('crazy');
    }

    segments.forEach(s => {
        s.addEventListener('click', () => {
            const cat = s.dataset.category;
            if (gameState.quesitos[cat]) return;
            iniciarCategoria(cat);
        });
    });

    finalQuestionBtn.addEventListener('click', () => iniciarPreguntaFinal());

    function iniciarCategoria(cat) {
        gameState.categoriaActual = cat;
        gameState.indexPreguntaActual = 0;
        gameState.esPreguntaFinal = false;
        setPresenterMood('happy', `¡A por el quesito de ${cat.toUpperCase()}! Mucha suerte.`);
        
        boardScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        backBtn.classList.add('hidden');
        mostrarPregunta();
    }

    function mostrarPregunta() {
        answersContainer.innerHTML = '';
        let data = gameState.esPreguntaFinal ? quizData.final : quizData[gameState.categoriaActual][gameState.indexPreguntaActual];
        questionText.textContent = data.q;

        data.a.forEach((text, idx) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = text;
            btn.addEventListener('click', () => verificarRespuesta(idx, data.c, btn));
            answersContainer.appendChild(btn);
        });
    }

    function verificarRespuesta(sel, corr, btn) {
        const buttons = answersContainer.querySelectorAll('.answer-btn');

        if (sel === corr) {
            btn.classList.add('correct-choice');
            buttons.forEach(b => b.disabled = true);

            if (gameState.esPreguntaFinal) {
                setPresenterMood('crazy', "¡SI! ¡BRUTAL! ¡LA RESPUESTA CORRECTA ERA KAROL G! ¡NOS VAMOS A SEVILLA!");
                lanzarFuegosArtificiales();
                setTimeout(() => mostrarPremioFinal(), 2000);
            } else {
                gameState.quesitos[gameState.categoriaActual] = true;
                setPresenterMood('happy', "¡Espectacular! ¡Has ganado la porción!");
                actualizarTableroUI(gameState.categoriaActual);
                setTimeout(() => volverAlTablero(), 1500);
            }
        } else {
            btn.classList.add('incorrect-choice');
            if (gameState.esPreguntaFinal) {
                btn.disabled = true;
                setPresenterMood('sad', "¡Ay va! Ese no es el concierto... ¡Sigue probando con los botones libres!");
            } else {
                buttons.forEach(b => b.disabled = true);
                gameState.indexPreguntaActual++;
                setPresenterMood('sad', "¡Respuesta incorrecta! Vaya fallo.");

                if (gameState.indexPreguntaActual < quizData[gameState.categoriaActual].length) {
                    setTimeout(() => mostrarPregunta(), 1500);
                } else {
                    setTimeout(() => {
                        setPresenterMood('sad', "Has agotado las preguntas de esta categoría. ¡Regresa al tablero y elige otra!");
                        backBtn.classList.remove('hidden');
                        backBtn.onclick = volverAlTablero;
                    }, 1000);
                }
            }
        }
    }

    function actualizarTableroUI(cat) {
        const segment = document.querySelector(`.wheel-segment[data-category="${cat}"]`);
        segment.classList.add('completed');
        
        const total = Object.values(gameState.quesitos).filter(v => v === true).length;
        quesitosCountLabel.textContent = `Quesitos: ${total} / 6`;

        if (total === 6) {
            setTimeout(() => {
                wheel.classList.add('hidden');
                finalQuestionBtn.classList.remove('hidden');
                setPresenterMood('crazy', "¡Increíble, tienes los 6 quesitos del Trivial! ¡Desbloqueaste la Gran Pregunta Final de Cumpleaños!");
            }, 1000);
        }
    }

    function volverAlTablero() {
        quizScreen.classList.add('hidden');
        boardScreen.classList.remove('hidden');
    }

    function iniciarPreguntaFinal() {
        gameState.esPreguntaFinal = true;
        boardScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        backBtn.classList.add('hidden');
        setPresenterMood('happy', "¡Llegó el momento de la verdad!");
        mostrarPregunta();
    }

    function lanzarFuegosArtificiales() {
        let duration = 12 * 1000;
        let animationEnd = Date.now() + duration;
        let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 999 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        let interval = setInterval(function() {
            let timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            let particleCount = 50 * (timeLeft / duration);
            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
            confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
    }

    function mostrarPremioFinal() {
        quizScreen.classList.add('hidden');
        endScreen.classList.remove('hidden');
        
        const audioPremio = new Audio('cancion.mp3');
        audioPremio.volume = 0.7;
        audioPremio.play().catch(e => console.log("Audio en espera de interacción."));
    }
</script>
